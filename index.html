<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DXN Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Tahoma', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 pb-24">
    <header class="bg-green-700 text-white p-4 text-center shadow-md mb-6">
        <h1 class="text-2xl font-bold">کەتەلۆگی زیرەکی DXN</h1>
    </header>

    <div id="product-list" class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="bg-white p-4 rounded-lg shadow flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img src="https://www.dxnarabia.com/img/products/101.png" class="w-20 h-20 object-contain" alt="Ganozh">
                <div>
                    <h3 class="font-bold">مەعجونی ددان</h3>
                    <p class="text-green-600 font-bold">IQD 9,500</p>
                </div>
            </div>
            <button onclick="addToCart(1, 'مەعجون', 9500)" class="bg-green-500 text-white w-10 h-10 rounded-full text-xl">+</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-between items-center shadow-lg">
        <div class="text-right">
            <p class="font-bold text-green-700">کۆی گشتی: <span id="total-price">0</span> IQD</p>
        </div>
        <button onclick="sendWhatsApp()" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold">تەواوکرنی کڕین</button>
    </div>

    <script>
        let cart = {};
        function addToCart(id, name, price) {
            cart[id] = (cart[id] || 0) + 1;
            updateUI();
        }
        function updateUI() {
            let total = 0;
            for (let id in cart) { total += cart[id] * 9500; }
            document.getElementById('total-price').innerText = total.toLocaleString();
        }
        function sendWhatsApp() {
            let msg = "سڵاو، تکایە ئەم داواکارییانەم بۆ جێبەجێ بکە:\n";
            for (let id in cart) { msg += - مەعجون: ${cart[id]} دانە\n; }
            window.open(https://wa.me/9647508168860?text=${encodeURIComponent(msg)});
        }
    </script>
</body>
</html>
