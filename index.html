<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DXN Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body>

    <div id="page1" class="max-w-md mx-auto p-4">
        <div class="bg-green-700 text-white p-4 rounded-b-2xl shadow-lg text-center mb-6">
            <h1 class="text-xl font-bold text-yellow-300">کەتەلۆگێ زیرەکێ DXN</h1>
        </div>
        
        <div id="product-list" class="space-y-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm flex items-center border-r-4 border-green-600">
                <div class="flex-grow">
                    <h3 class="font-bold">کەکەوا کوکوزی</h3>
                    <p class="text-green-700 font-bold text-sm">26,000 IQD | <span class="text-blue-600">13 PV</span></p>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="changeQty(1, -1)" class="w-8 h-8 bg-gray-100 rounded-full font-bold text-red-600">-</button>
                    <span id="qty-1" class="font-bold">0</span>
                    <button onclick="changeQty(1, 1)" class="w-8 h-8 bg-green-100 rounded-full font-bold text-green-600">+</button>
                </div>
            </div>
            </div>

        <button onclick="showPage2()" class="w-full bg-green-600 text-white mt-10 py-4 rounded-2xl font-bold shadow-xl">بەرەو فاتوورێ ➔</button>
    </div>

    <div id="page2" class="hidden max-w-md mx-auto p-4">
        <div class="bg-white p-6 rounded-3xl shadow-2xl">
            <h2 class="text-center font-bold text-lg mb-6 border-b pb-2">زانیاریێن داخوازکەر</h2>
            <div class="space-y-4">
                <input id="memberName" type="text" placeholder="ناڤێ ئەندامی" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                <input id="memberCode" type="text" placeholder="کۆدێ ئەندامی" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                <input id="customerLoc" type="text" placeholder="ناڤونیشان" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                <input id="customerPhone" type="tel" placeholder="ژمارا تەلەفۆنا بکری" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500">
            </div>
            
            <div class="my-6 p-4 bg-green-50 rounded-2xl border border-green-100">
                <p class="flex justify-between font-bold text-green-800"><span>کۆما پارەی:</span> <span id="finalPrice">0</span> IQD</p>
                <p class="flex justify-between text-sm text-blue-700 mt-2"><span>کۆما خالان:</span> <span id="finalPV">0</span> PV</p>
            </div>

            <button onclick="sendToWA()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg">OK - هنارتن بۆ واتساپێ</button>
        </div>
    </div>

    <script>
        const cart = { 1: { name: "کەکەوا کوکوزی", price: 26000, pv: 13, qty: 0 } };

        function changeQty(id, amt) {
            cart[id].qty = Math.max(0, cart[id].qty + amt);
            document.getElementById(qty-${id}).innerText = cart[id].qty;
        }

        function showPage2() {
            let total = 0, pv = 0, count = 0;
            for(let id in cart) {
                total += cart[id].qty * cart[id].price;
                pv += cart[id].qty * cart[id].pv;
                count += cart[id].qty;
            }
            if(count === 0) return alert("تکایە بەرهەمەکێ هەلبژێرە!");
          document.getElementById('finalPrice').innerText = total.toLocaleString();
            document.getElementById('finalPV').innerText = pv;
            document.getElementById('page1').classList.add('hidden');
            document.getElementById('page2').classList.remove('hidden');
        }

        function sendToWA() {
            const name = document.getElementById('memberName').value;
            const loc = document.getElementById('customerLoc').value;
            if(!name || !loc) return alert("تکایە ناڤ و جهی بنڤیسە!");

            let msg = 📋 *تەلەبیاتا DXN نوو*%0A👤 ناڤ: ${name}%0A📍 جهـ: ${loc}%0A📦 بەرهەم: ${cart[1].qty} دانە کوکوزی%0A💰 کۆم: ${document.getElementById('finalPrice').innerText} IQD;
            window.open(https://wa.me/9647508168860?text=${msg});
        }
    </script>
</body>
</html>
