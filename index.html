<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DXN Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Tahoma', sans-serif; }</style>
</head>
<body class="bg-gray-100 pb-24">
    <header class="bg-green-700 text-white p-4 text-center shadow-lg sticky top-0 z-50">
        <h1 class="text-xl font-bold">کەتەلۆگێ زیرەکێ DXN</h1>
    </header>

    <div id="product-list" class="container mx-auto p-4 grid gap-4"></div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-between items-center shadow-2xl">
        <div class="text-right">
            <p class="font-bold text-green-700">کۆم: <span id="total-price">0</span> IQD</p>
            <p class="text-xs text-gray-500">خال: <span id="total-pv">0</span> PV</p>
        </div>
        <button onclick="sendWhatsApp()" class="bg-green-600 text-white px-6 py-2 rounded-full font-bold">تەواوکرنا کڕینێ 🛒</button>
    </div>

    <script>
        const products = [
            { id: 1, name: "قەهوا لینجزی یا ڕەش", price: 19500, pv: 10 },
            { id: 2, name: "عەصیرێ مۆرنزی", price: 53500, pv: 35 },
            { id: 3, name: "مەعجینا ددانان", price: 10500, pv: 6 }
        ];

        let cart = {};

        function render() {
            document.getElementById('product-list').innerHTML = products.map(p => 
                <div class="bg-white p-4 rounded-lg shadow flex justify-between items-center">
                    <div>
                        <h3 class="font-bold">${p.name}</h3>
                        <p class="text-green-600">${p.price} IQD</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="update(${p.id}, 1)" class="bg-green-100 text-green-700 w-8 h-8 rounded-full font-bold">+</button>
                        <span class="font-bold">${cart[p.id] || 0}</span>
                        <button onclick="update(${p.id}, -1)" class="bg-red-100 text-red-700 w-8 h-8 rounded-full font-bold">-</button>
                    </div>
                </div>
            ).join('');
            
            let total = 0, pvs = 0;
            products.forEach(p => {
                if(cart[p.id]) {
                    total += cart[p.id] * p.price;
                    pvs += cart[p.id] * p.pv;
                }
            });
            document.getElementById('total-price').innerText = total;
            document.getElementById('total-pv').innerText = pvs;
        }

        function update(id, amt) {
            cart[id] = (cart[id] || 0) + amt;
            if(cart[id] < 0) cart[id] = 0;
            render();
        }

        function sendWhatsApp() {
            let msg = "سڵاو، ئەڤ تەلەبیاتە من دڤێت:%0A";
            products.forEach(p => { if(cart[p.id] > 0) msg += ▪️ ${p.name} (${cart[p.id]})%0A; });
            msg += %0A💰 کۆم: ${document.getElementById('total-price').innerText} IQD;
            window.open(https://wa.me/9647508168860?text=${msg});
        }
        render();
    </script>
</body>
</html>
